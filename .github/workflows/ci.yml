name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install Playwright
        run: pip install playwright==1.54.0 && playwright install chromium

      - name: Lint
        run: pip install ruff && ruff check .

      - name: Test with pytest
        run: pytest --cov=live_runtime --cov=scripts --cov-report=term-missing --cov-fail-under=80 --tb=short

      - name: Verify contracts (dry-run)
        run: |
          bash scripts/verify/s01_check.sh --dry-run
          bash scripts/verify/s02_check.sh --dry-run
